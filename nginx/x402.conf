# ─── VPS setup steps (run once) ───────────────────────────────────────────────
# 1. Clone repo:   git clone <repo-url> /opt/x402-playground
# 2. Install uv:   curl -LsSf https://astral.sh/uv/install.sh | sh
# 3. Install deps: cd /opt/x402-playground/backend && uv sync
# 4. Install cert: certbot --nginx -d api.oasaka.xyz
# 5. Copy service: cp nginx/x402-backend.service /etc/systemd/system/
# 6. Enable:       systemctl daemon-reload && systemctl enable --now x402-backend
# 7. Copy nginx:   cp nginx/x402.conf /etc/nginx/sites-enabled/x402.conf
# 8. Test nginx:   nginx -t && nginx -s reload
# 9. Add Secrets to GitHub:
#    VPS_HOST — IP or hostname of your VPS
#    VPS_USER — SSH username (e.g. ubuntu)
#    VPS_SSH_KEY — private key (run: ssh-keygen -t ed25519 -f ~/.ssh/x402_deploy)
#                  add public key to ~/.ssh/authorized_keys on VPS
# ──────────────────────────────────────────────────────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name api.oasaka.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.oasaka.xyz;

    ssl_certificate     /etc/letsencrypt/live/api.oasaka.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.oasaka.xyz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Pass X-PAYMENT header through
        proxy_pass_request_headers on;

        # CORS is handled by FastAPI's CORSMiddleware (backend/main.py):
        #   allow_origins=["https://x402.oasaka.xyz"]
        #   allow_methods=["GET", "POST", "OPTIONS"]
        #   allow_headers=["Content-Type", "X-PAYMENT"]
        # No CORS headers needed here.
    }
}
